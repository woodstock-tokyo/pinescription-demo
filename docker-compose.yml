services:

  backend:
    build:
      context: ./backend
      ssh:
        - default
    container_name: pinescription-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 8s
      timeout: 4s
      retries: 6
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    container_name: pinescription-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
